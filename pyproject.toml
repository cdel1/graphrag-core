[project]
name = "graphrag-core"
version = "0.1.0"
description = "Domain-agnostic Graph RAG framework"
license = "MIT"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graphrag_core"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
